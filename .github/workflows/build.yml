name: Build macOS App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Python 3.14, Tk, and SDL2
        run: brew install python@3.14 python-tk@3.14 sdl2 sdl2_image sdl2_mixer sdl2_ttf portmidi

      - name: Build app
        run: bash build_app.sh

      - name: Import Developer ID certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode -o certificate.p12
          security create-keychain -p ci-keychain-password build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p ci-keychain-password build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k ci-keychain-password build.keychain
          rm certificate.p12

      - name: Sign app
        run: |
          codesign --deep --force --options runtime \
            --entitlements entitlements.plist \
            --sign "Developer ID Application" \
            "dist/Waveform Matched Sampler.app"

      - name: Package for notarization
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "dist/Waveform Matched Sampler.app" \
            "dist/Waveform Matched Sampler.zip"

      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit "dist/Waveform Matched Sampler.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Staple notarization ticket
        run: xcrun stapler staple "dist/Waveform Matched Sampler.app"

      - name: Repackage stapled app
        run: |
          rm "dist/Waveform Matched Sampler.zip"
          ditto -c -k --sequesterRsrc --keepParent \
            "dist/Waveform Matched Sampler.app" \
            "dist/Waveform Matched Sampler.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Waveform-Matched-Sampler-macOS
          path: dist/Waveform Matched Sampler.zip
          retention-days: 30
