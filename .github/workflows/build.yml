name: Build macOS App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Python 3.14 and Tk
        run: brew install python@3.14 python-tk@3.14

      - name: Build app
        run: bash build_app.sh

      - name: Package .app for upload
        # ditto preserves macOS resource forks, symlinks, and extended attributes
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "dist/Waveform Matched Sampler.app" \
            "dist/Waveform Matched Sampler.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Waveform-Matched-Sampler-macOS
          path: dist/Waveform Matched Sampler.zip
          retention-days: 30
